<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard | Water-Guard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-mode">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo-section" style="margin-bottom: 2rem;">
                <div class="icon-ring-small" style="background: var(--accent-blue);"><i class="fa-solid fa-chart-simple"></i></div>
                <h1 style="font-size: 1.2rem;">Data Insights</h1>
            </div>
            
            <nav class="sidebar-nav">
                <a href="officer.html" class="sidebar-link">
                    <i class="fa-solid fa-arrow-left"></i> Back to Reports
                </a>
                <a href="#" class="sidebar-link active">
                    <i class="fa-solid fa-chart-line"></i> Strategic Trends
                </a>
                <a href="#" class="sidebar-link">
                    <i class="fa-solid fa-map"></i> Regional Heatmap
                </a>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 1rem 0;">
                <a href="index.html" class="sidebar-link text-danger">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <main style="padding: 2.5rem; overflow-y: auto; background: #0B1218;">
            <div class="section-header" style="margin-bottom: 2.5rem;">
                <h2>Platform Analytics Dashboard</h2>
                <p style="color: var(--text-secondary);">Quantifying the impact of our detection and resolution systems.</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                <div class="glass-panel">
                    <h4 style="margin-bottom: 1rem;">Resolutions: Target vs Achieved</h4>
                    <canvas id="resolutionChart"></canvas>
                </div>
                <div class="glass-panel">
                    <h4 style="margin-bottom: 1rem;">Encroachment Types (Regional)</h4>
                    <canvas id="typeChart"></canvas>
                </div>
            </div>

            <div class="glass-panel">
                <h4 style="margin-bottom: 1rem;">Monthly Encroachment Detection Trends (AI Detected)</h4>
                <canvas id="trendChart" style="max-height: 300px;"></canvas>
            </div>
        </main>
    </div>

    <script>
        const ctx1 = document.getElementById('resolutionChart').getContext('2d');
        new Chart(ctx1, {
            type: 'pie',
            data: {
                labels: ['Pending', 'Investigating', 'Resolved'],
                datasets: [{
                    data: [12, 19, 45],
                    backgroundColor: ['#f59e0b', '#3b82f6', '#10b981'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: '#94a3b8' } } } }
        });

        const ctx2 = document.getElementById('typeChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Construction', 'Dumping', 'Land Grabbing', 'Illegal Fencing'],
                datasets: [{
                    label: 'Cases Detected',
                    data: [65, 45, 30, 20],
                    backgroundColor: '#3b82f6'
                }]
            },
            options: { 
                scales: { 
                    y: { ticks: { color: '#94a3b8' } },
                    x: { ticks: { color: '#94a3b8' } }
                }
            }
        });

        const ctx3 = document.getElementById('trendChart').getContext('2d');
        new Chart(ctx3, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Active Encroachments',
                    data: [80, 75, 70, 68, 60, 55],
                    borderColor: '#10b981',
                    fill: true,
                    backgroundColor: 'rgba(16, 185, 129, 0.1)'
                }]
            },
            options: { 
                scales: { 
                    y: { ticks: { color: '#94a3b8' } },
                    x: { ticks: { color: '#94a3b8' } }
                }
            }
        });
    </script>
</body>
</html>
