<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water-Guard AI | Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0B1218;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .auth-tab {
            padding: 10px 0;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .role-option {
            padding: 10px;
            text-align: center;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .role-option.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="icon-ring-small" style="margin: 0 auto 1rem; width: 48px; height: 48px;">
                    <i class="fa-solid fa-water"></i>
                </div>
                <h2 style="font-weight: 800;">Secure Portal</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Citizen & Officer Access</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('register')">Register</div>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="text" id="username" placeholder="Enter your credentials" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div id="registerFields" style="display: none;">
                    <div class="form-group">
                        <label>Select Your Role</label>
                        <div class="role-selector">
                            <div class="role-option active" data-role="citizen" onclick="selectRole(this)">Citizen</div>
                            <div class="role-option" data-role="officer" onclick="selectRole(this)">Officer</div>
                            <div class="role-option" data-role="admin" onclick="selectRole(this)">Admin</div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    <span id="btnText">Sign In</span>
                </button>

                <p id="authMessage" style="margin-top: 1rem; text-align: center; font-size: 0.85rem;"></p>
                
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="#" style="color: var(--text-secondary); text-decoration: none; font-size: 0.8rem;">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'login';
        let selectedRole = 'citizen';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('registerFields').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('btnText').innerText = tab === 'login' ? 'Sign In' : 'Create Account';
            document.getElementById('authMessage').innerText = '';
        }

        function selectRole(el) {
            document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            selectedRole = el.getAttribute('data-role');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('authMessage');

            const endpoint = currentTab === 'login' ? '/login' : '/register';
            const body = { username, password };
            if (currentTab === 'register') body.role = selectedRole;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if (response.ok) {
                    messageEl.style.color = 'var(--accent-green)';
                    messageEl.innerText = data.message || 'Success!';
                    
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);

                    setTimeout(() => {
                        window.location.href = (data.role === 'officer' || data.role === 'admin') ? 'officer.html' : 'citizen.html';
                    }, 1000);
                } else {
                    messageEl.style.color = 'var(--accent-danger)';
                    messageEl.innerText = data.detail || 'Authentication failed';
                }
            } catch (err) {
                messageEl.innerText = 'Error connecting to server';
            }
        }
    </script>
</body>
</html>
