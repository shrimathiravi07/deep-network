<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water-Guard AI | Contact</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .contact-hero {
            background: #0B1218 !important; /* Forces no image */
            min-height: 40vh !important;
            padding-top: 120px;
        }

        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 3rem;
            text-align: left;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .contact-item i {
            font-size: 1.5rem;
            color: var(--accent-blue);
            width: 50px;
            height: 50px;
            background: rgba(59, 130, 246, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .contact-info h4 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .contact-info p {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body class="landing-mode">
    <!-- Navigation Header -->
    <header class="landing-header">
        <div class="header-container">
            <a href="index.html" class="logo-brand">
                <div class="icon-ring-small">
                    <i class="fa-solid fa-water"></i>
                </div>
                <h1>Water-Guard AI</h1>
            </a>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="login.html" class="nav-link login-btn">Login / Register</a>
            </nav>
        </div>
    </header>

    <main>
        <!-- Contact Hero -->
        <section class="hero-section contact-hero">
            <div class="hero-overlay" style="background: transparent;"></div>
            <div class="hero-content" style="grid-template-columns: 1fr; text-align: center;">
                <div class="hero-text">
                    <h2 class="hero-title">Get In Touch</h2>
                    <p class="hero-subtitle">Help us protect our water bodies. We are here to listen.</p>
                </div>
            </div>
        </section>

        <!-- Contact Information -->
        <section class="contact-container">
            <div class="contact-card">
                <div class="contact-item">
                    <i class="fa-solid fa-envelope"></i>
                    <div class="contact-info">
                        <h4>Email Us</h4>
                        <p>info@waterguard.ai</p>
                    </div>
                </div>

                <div class="contact-item">
                    <i class="fa-solid fa-phone"></i>
                    <div class="contact-info">
                        <h4>Call Us</h4>
                        <p>+91 (044) 2748 1000</p>
                    </div>
                </div>

                <div class="contact-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <div class="contact-info">
                        <h4>Headquarters</h4>
                        <p>Chennai, Tamil Nadu, India</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="landing-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Water-Guard AI. All rights reserved. | Protecting Nature with Intelligence</p>
        </div>
    </footer>
</body>
</html>
